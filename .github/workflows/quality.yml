name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # svelte-kit sync only declares $env/static/* members for keys present in
      # the environment; without them svelte-check fails on every $env import.
      - name: Provide env keys for svelte-kit sync
        run: cp .env.example .env
      - run: npm run quality
      - name: Check migration immutability
        if: github.event_name == 'pull_request'
        run: npm run quality:immutability

  mutation:
    name: Mutation tests
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Provide env keys for svelte-kit sync
        run: cp .env.example .env
      - run: npm run test:mutation
