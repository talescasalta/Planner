name: RLS Tests

on:
  pull_request:
    paths:
      - 'supabase/**'
      - .github/workflows/rls.yml
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - .github/workflows/rls.yml
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: read

jobs:
  rls:
    name: RLS Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Start local Supabase database
        run: npx supabase db start
      - name: Run pgTAP RLS tests
        run: npx supabase test db
