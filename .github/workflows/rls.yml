name: RLS Tests

on:
  pull_request:
    paths:
      - 'supabase/**'
      - .github/workflows/rls.yml
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - .github/workflows/rls.yml
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: read

jobs:
  rls:
    name: RLS Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Start local Supabase database
        run: npx supabase db start
      - name: Run pgTAP RLS tests
        run: npx supabase test db
